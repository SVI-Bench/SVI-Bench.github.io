<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVI-Bench — Tape Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Serif:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0a0a0c; }
    body { font-family: "IBM Plex Sans", sans-serif; color: #fafafa; min-height: 100vh; }
    @keyframes tileIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    a { color: inherit; }
    button { font-family: inherit; cursor: pointer; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useEffect, useRef, useState, useMemo } = React;

    const PILLARS = {
      Perception: { base: '#4A7FB5', glow: 'rgba(74,127,181,0.55)', soft: 'rgba(74,127,181,0.12)' },
      Reasoning:  { base: '#2E9E8F', glow: 'rgba(46,158,143,0.55)', soft: 'rgba(46,158,143,0.12)' },
      Simulation: { base: '#D4913A', glow: 'rgba(212,145,58,0.55)', soft: 'rgba(212,145,58,0.12)' },
      Agency:     { base: '#C0392B', glow: 'rgba(192,57,43,0.55)',  soft: 'rgba(192,57,43,0.12)' },
    };

    const FAILURES = [
      { id: 'f01', taskId: 'T1', pillar: 'Perception', model: 'GPT-5.2',     sport: 'NBA', mode: 'swapped jersey numbers',          excerpt: '"Player #4 set the screen for #23" — neither was on the floor.' },
      { id: 'f02', taskId: 'T1', pillar: 'Perception', model: 'Gemini 2.5',  sport: 'NBA', mode: 'missed the screen entirely',      excerpt: '"Player isolated and drove right" — there was a hard double-screen.' },
      { id: 'f03', taskId: 'T2', pillar: 'Perception', model: 'GPT-5.2',     sport: 'NBA', mode: 'chose step-back over drive',      excerpt: '"B — step-back three." Actual: drive & dish for a finish at the rim.' },
      { id: 'f04', taskId: 'T2', pillar: 'Perception', model: 'Qwen3-VL',    sport: 'NBA', mode: 'mistook spin for crossover',      excerpt: '"Crossover dribble." Was a 360° spin-and-finish.' },
      { id: 'f05', taskId: 'T3', pillar: 'Perception', model: 'InternVideo', sport: 'NBA', mode: 'right play, wrong game',          excerpt: 'Top-1 retrieval was a different team executing the same set.' },
      { id: 'f06', taskId: 'T3', pillar: 'Perception', model: 'CLIP',        sport: 'NBA', mode: 'matched on color, missed action', excerpt: 'All top-5 results shared team colors; none had the requested screen action.' },
      { id: 'f07', taskId: 'T4', pillar: 'Reasoning',  model: 'GPT-5.2',     sport: 'NBA', mode: 'blamed perimeter, actual at rim', excerpt: '"Open three from the corner." Was a finish at the rim, no rotation.' },
      { id: 'f08', taskId: 'T4', pillar: 'Reasoning',  model: 'Gemini 2.5',  sport: 'NBA', mode: 'invented tactical adjustment',    excerpt: '"Coach changed to zone defense." No such change occurred.' },
      { id: 'f09', taskId: 'T5', pillar: 'Reasoning',  model: 'GPT-5.2',     sport: 'NBA', mode: 'predicted score, was foul',       excerpt: '62% "made 2." Actual: shooting foul, two free throws.' },
      { id: 'f10', taskId: 'T5', pillar: 'Reasoning',  model: 'Qwen3-VL',    sport: 'NHL', mode: 'wrong outcome with confidence',   excerpt: '54% "shot saved." Actual: defender lost the puck for a breakaway.' },
      { id: 'f11', taskId: 'T6', pillar: 'Reasoning',  model: 'GPT-5.2',     sport: 'NBA', mode: 'covered 1 of 6 salient events',   excerpt: 'Mentioned the lead. Missed ejection, technical, run, injury, buzzer-beater.' },
      { id: 'f12', taskId: 'T6', pillar: 'Reasoning',  model: 'Gemini 2.5',  sport: 'EPL', mode: 'summarized vibe, missed substance', excerpt: '"Both teams played a possession game." Said nothing about the three red cards.' },
      { id: 'f13', taskId: 'T7', pillar: 'Simulation', model: 'best baseline', sport: 'NBA', mode: 'predicted path drifted 49%',     excerpt: 'mIoU 0.51 — generated player trajectories diverged from prescribed motion.' },
      { id: 'f14', taskId: 'T7', pillar: 'Simulation', model: 'best baseline', sport: 'EPL', mode: 'player rotations reversed',      excerpt: 'Wing and fullback positions swapped through the entire build-up sequence.' },
      { id: 'f15', taskId: 'T8', pillar: 'Simulation', model: 'best baseline', sport: 'NBA', mode: 'chose pull-up over finish',      excerpt: '"Pulled up for three over the closeout." Needed to attack the lane.' },
      { id: 'f16', taskId: 'T8', pillar: 'Simulation', model: 'Qwen3-VL',     sport: 'NBA', mode: 'kicked out to the wrong shooter', excerpt: 'Passed to the corner with the defender already rotated; result was contested.' },
      { id: 'f17', taskId: 'T9', pillar: 'Agency',     model: 'GPT-5.2',     sport: 'NBA', mode: 'video_search returned irrelevant', excerpt: 'Found clips but not the ones referenced in the question.' },
      { id: 'f18', taskId: 'T9', pillar: 'Agency',     model: 'Qwen3-VL',    sport: 'NBA', mode: 'never invoked video search',       excerpt: 'Used doc_qa only. Confidently wrong synthesis: claimed no change occurred.' },
      { id: 'f19', taskId: 'T9', pillar: 'Agency',     model: 'Gemini 2.5',  sport: 'NBA', mode: 'right answer, wrong trigger',     excerpt: 'Identified the defensive change correctly. Attributed it to an injury, not the adjustment.' },
    ];

    const TOTAL_FAILURES = 287;

    function StaticCourtThumb({ pillarColor }) {
      return (
        <svg viewBox="0 0 360 480" style={{ width: '100%', height: '100%', display: 'block' }}>
          <rect x={0} y={0} width={360} height={480} fill="#0c0d10" />
          <rect x={20} y={20} width={320} height={440} fill="none" stroke="#27272a" strokeWidth={1} />
          <rect x={130} y={20} width={100} height={130} fill="rgba(255,255,255,0.02)" stroke="#27272a" strokeWidth={0.8} />
          <line x1={158} y1={32} x2={202} y2={32} stroke="#3f3f46" strokeWidth={2} />
          <circle cx={180} cy={42} r={6} fill="none" stroke="#3f3f46" strokeWidth={1.2} />
          <line x1={50}  y1={20} x2={50}  y2={150} stroke="#27272a" strokeWidth={0.8} />
          <line x1={310} y1={20} x2={310} y2={150} stroke="#27272a" strokeWidth={0.8} />
          <path d="M 50 150 A 130 130 0 0 0 310 150" fill="none" stroke="#27272a" strokeWidth={0.8} />
          <circle cx={180} cy={360} r={6} fill={pillarColor} opacity={0.85} />
          <circle cx={230} cy={180} r={6} fill={pillarColor} opacity={0.65} />
          <circle cx={65}  cy={290} r={6} fill={pillarColor} opacity={0.55} />
          <circle cx={300} cy={390} r={6} fill={pillarColor} opacity={0.55} />
          <circle cx={110} cy={430} r={6} fill={pillarColor} opacity={0.55} />
        </svg>
      );
    }

    function StaticPitchThumb({ pillarColor }) {
      return (
        <svg viewBox="0 0 360 480" style={{ width: '100%', height: '100%', display: 'block' }}>
          <rect x={0} y={0} width={360} height={480} fill="#0c0d10" />
          <rect x={20} y={20} width={320} height={440} fill="none" stroke="#27272a" strokeWidth={1} />
          <line x1={20} y1={240} x2={340} y2={240} stroke="#27272a" strokeWidth={0.8} />
          <circle cx={180} cy={240} r={40} fill="none" stroke="#27272a" strokeWidth={0.8} />
          <rect x={120} y={20} width={120} height={70} fill="none" stroke="#27272a" strokeWidth={0.8} />
          <rect x={120} y={390} width={120} height={70} fill="none" stroke="#27272a" strokeWidth={0.8} />
          <circle cx={180} cy={310} r={6} fill={pillarColor} opacity={0.85} />
          <circle cx={120} cy={180} r={6} fill={pillarColor} opacity={0.65} />
          <circle cx={240} cy={180} r={6} fill={pillarColor} opacity={0.65} />
          <circle cx={90}  cy={350} r={6} fill={pillarColor} opacity={0.55} />
          <circle cx={270} cy={350} r={6} fill={pillarColor} opacity={0.55} />
        </svg>
      );
    }

    function StaticRinkThumb({ pillarColor }) {
      return (
        <svg viewBox="0 0 360 480" style={{ width: '100%', height: '100%', display: 'block' }}>
          <rect x={0} y={0} width={360} height={480} fill="#0c0d10" />
          <rect x={20} y={20} width={320} height={440} rx={60} fill="none" stroke="#27272a" strokeWidth={1} />
          <line x1={20} y1={140} x2={340} y2={140} stroke="#3f3f46" strokeWidth={0.8} />
          <line x1={20} y1={340} x2={340} y2={340} stroke="#3f3f46" strokeWidth={0.8} />
          <line x1={20} y1={240} x2={340} y2={240} stroke="#27272a" strokeWidth={0.8} />
          <circle cx={180} cy={240} r={20} fill="none" stroke="#27272a" strokeWidth={0.8} />
          <circle cx={180} cy={300} r={6} fill={pillarColor} opacity={0.85} />
          <circle cx={120} cy={220} r={6} fill={pillarColor} opacity={0.65} />
          <circle cx={240} cy={200} r={6} fill={pillarColor} opacity={0.65} />
          <circle cx={90}  cy={380} r={6} fill={pillarColor} opacity={0.55} />
          <circle cx={270} cy={380} r={6} fill={pillarColor} opacity={0.55} />
        </svg>
      );
    }

    function StaticTreeThumb({ pillarColor }) {
      return (
        <svg viewBox="0 0 360 480" style={{ width: '100%', height: '100%', display: 'block' }}>
          <rect x={0} y={0} width={360} height={480} fill="#0c0d10" />
          <text x={20} y={34} fontFamily='"IBM Plex Mono", monospace' fontSize={11} fill="#a1a1aa" letterSpacing="0.15em">AGENT</text>
          <line x1={60}  y1={240} x2={150} y2={140} stroke="#27272a" strokeWidth={1} />
          <line x1={60}  y1={240} x2={150} y2={240} stroke="#27272a" strokeWidth={1} />
          <line x1={60}  y1={240} x2={150} y2={340} stroke="#27272a" strokeWidth={1} />
          <line x1={150} y1={140} x2={260} y2={100} stroke={pillarColor} strokeWidth={1.5} opacity={0.95} />
          <line x1={150} y1={140} x2={260} y2={180} stroke="#27272a" strokeWidth={1} />
          <line x1={150} y1={240} x2={260} y2={220} stroke="#27272a" strokeWidth={1} />
          <line x1={150} y1={240} x2={260} y2={260} stroke="#27272a" strokeWidth={1} />
          <line x1={150} y1={340} x2={260} y2={320} stroke="#27272a" strokeWidth={1} />
          <line x1={150} y1={340} x2={260} y2={380} stroke="#27272a" strokeWidth={1} />
          <circle cx={60}  cy={240} r={5} fill="#0c0d10" stroke="#71717a" strokeWidth={1.2} />
          <circle cx={150} cy={140} r={4} fill="#0c0d10" stroke={pillarColor} strokeWidth={1.2} />
          <circle cx={150} cy={240} r={4} fill="#0c0d10" stroke="#71717a" strokeWidth={1} />
          <circle cx={150} cy={340} r={4} fill="#0c0d10" stroke="#71717a" strokeWidth={1} />
          <circle cx={260} cy={100} r={6} fill={pillarColor} stroke={pillarColor} strokeWidth={1.2} />
          <circle cx={260} cy={180} r={5} fill="none" stroke="#52525b" strokeWidth={1.2} />
          <circle cx={260} cy={220} r={5} fill="none" stroke="#52525b" strokeWidth={1.2} />
          <circle cx={260} cy={260} r={5} fill="none" stroke="#52525b" strokeWidth={1.2} />
          <circle cx={260} cy={320} r={5} fill="none" stroke="#52525b" strokeWidth={1.2} />
          <circle cx={260} cy={380} r={5} fill="none" stroke="#52525b" strokeWidth={1.2} />
        </svg>
      );
    }

    function FailureThumb({ failure, pillarColor }) {
      if (failure.taskId === 'T9') return <StaticTreeThumb pillarColor={pillarColor} />;
      if (failure.sport === 'EPL') return <StaticPitchThumb pillarColor={pillarColor} />;
      if (failure.sport === 'NHL') return <StaticRinkThumb pillarColor={pillarColor} />;
      return <StaticCourtThumb pillarColor={pillarColor} />;
    }

    function FailureTile({ failure }) {
      const c = PILLARS[failure.pillar];
      const [hover, setHover] = useState(false);
      return (
        <div
          onMouseEnter={() => setHover(true)}
          onMouseLeave={() => setHover(false)}
          style={{
            background: '#0c0d10',
            border: hover ? `1px solid ${c.base}` : '1px solid #27272a',
            borderRadius: 4,
            overflow: 'hidden',
            display: 'flex', flexDirection: 'column',
            transition: 'all 200ms ease',
            transform: hover ? 'translateY(-2px)' : 'translateY(0)',
            boxShadow: hover ? `0 6px 24px rgba(0,0,0,0.5), 0 0 18px ${c.soft}` : 'none',
            cursor: 'pointer',
            animation: 'tileIn 400ms ease backwards',
        }}>
          <div style={{ aspectRatio: '4 / 3', position: 'relative', borderBottom: '1px solid #1c1c1f' }}>
            <FailureThumb failure={failure} pillarColor={c.base} />
            <div style={{
              position: 'absolute', top: 8, left: 10,
              fontFamily: '"IBM Plex Mono", monospace', fontSize: 11,
              color: c.base, fontWeight: 600, letterSpacing: '0.05em',
            }}>{failure.taskId}</div>
            <div style={{
              position: 'absolute', top: 8, right: 10,
              fontFamily: '"IBM Plex Mono", monospace', fontSize: 9,
              color: '#71717a', letterSpacing: '0.12em', textTransform: 'uppercase',
            }}>{failure.sport}</div>
          </div>
          <div style={{ padding: '11px 13px 12px', display: 'flex', flexDirection: 'column', gap: 4 }}>
            <div style={{
              fontFamily: '"IBM Plex Mono", monospace', fontSize: 9,
              color: '#71717a', letterSpacing: '0.12em', textTransform: 'uppercase',
            }}>{failure.model} · failure</div>
            <div style={{
              fontFamily: '"IBM Plex Sans", sans-serif', fontSize: 13,
              fontWeight: 500, color: '#fafafa', lineHeight: 1.3,
            }}>{failure.mode}</div>
            <div style={{
              fontFamily: '"IBM Plex Sans", sans-serif', fontSize: 11.5,
              color: '#a1a1aa', lineHeight: 1.45, marginTop: 2,
            }}>{failure.excerpt}</div>
          </div>
        </div>
      );
    }

    function FilterChip({ label, active, color, onClick }) {
      return (
        <button onClick={onClick} style={{
          padding: '6px 12px',
          background: active ? (color || '#fafafa') : 'transparent',
          border: `1px solid ${active ? (color || '#fafafa') : '#27272a'}`,
          borderRadius: 2,
          color: active ? '#0a0a0c' : '#a1a1aa',
          fontFamily: '"IBM Plex Mono", monospace', fontSize: 11,
          letterSpacing: '0.12em', textTransform: 'uppercase',
          fontWeight: active ? 600 : 400,
          transition: 'all 150ms ease',
        }}>{label}</button>
      );
    }

    function SurpriseButton({ onClick }) {
      return (
        <button onClick={onClick} style={{
          padding: '6px 14px',
          background: 'transparent',
          border: '1px dashed #3f3f46',
          borderRadius: 2,
          color: '#e4e4e7',
          fontFamily: '"IBM Plex Mono", monospace', fontSize: 11,
          letterSpacing: '0.12em', textTransform: 'uppercase',
        }}>↻  Surprise me</button>
      );
    }

    function TapeArchiveSection() {
      const [pillarFilter, setPillarFilter] = useState('All');
      const [shuffleSeed, setShuffleSeed] = useState(0);

      const filtered = useMemo(() => {
        let list = pillarFilter === 'All'
          ? FAILURES.slice()
          : FAILURES.filter(f => f.pillar === pillarFilter);
        if (shuffleSeed > 0) {
          list = list.slice();
          for (let i = list.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [list[i], list[j]] = [list[j], list[i]];
          }
        }
        return list;
      }, [pillarFilter, shuffleSeed]);

      const PILLAR_FILTERS = ['All', 'Perception', 'Reasoning', 'Simulation', 'Agency'];

      return (
        <section style={{
          minHeight: '100vh',
          padding: '110px 48px 80px',
          maxWidth: 1500, margin: '0 auto',
        }}>
          <div style={{ marginBottom: 36 }}>
            <div style={{
              fontFamily: '"IBM Plex Mono", monospace', fontSize: 11,
              letterSpacing: '0.2em', textTransform: 'uppercase',
              color: '#71717a', marginBottom: 16,
            }}>04 · Tape archive</div>
            <h2 style={{
              fontFamily: '"IBM Plex Serif", serif',
              fontSize: 'clamp(40px, 6vw, 76px)', fontWeight: 400,
              lineHeight: 1, letterSpacing: '-0.02em',
              margin: 0, marginBottom: 18, maxWidth: 1000,
            }}>
              {TOTAL_FAILURES} ways the field falls short.
            </h2>
            <p style={{
              fontFamily: '"IBM Plex Sans", sans-serif', fontSize: 16,
              lineHeight: 1.5, color: '#a1a1aa', maxWidth: 720, margin: 0,
            }}>
              Every entry is a real failure from a frontier video model. Filter by pillar to see
              where each class of capability breaks. The aggregate is the argument.
            </p>
          </div>

          <div style={{
            display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: 10,
            marginBottom: 28, paddingBottom: 22, borderBottom: '1px solid #1c1c1f',
          }}>
            <span style={{
              fontFamily: '"IBM Plex Mono", monospace', fontSize: 10,
              color: '#52525b', letterSpacing: '0.15em', textTransform: 'uppercase',
              marginRight: 6,
            }}>Filter ·</span>
            {PILLAR_FILTERS.map((p) => (
              <FilterChip
                key={p}
                label={p}
                active={pillarFilter === p}
                color={p === 'All' ? '#fafafa' : PILLARS[p]?.base}
                onClick={() => setPillarFilter(p)}
              />
            ))}
            <div style={{ flex: 1 }} />
            <SurpriseButton onClick={() => setShuffleSeed(s => s + 1)} />
          </div>

          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fit, minmax(230px, 1fr))',
            gap: 16,
            marginBottom: 40,
          }}>
            {filtered.map((failure, i) => (
              <div key={failure.id + '_' + shuffleSeed} style={{ animationDelay: `${i * 25}ms` }}>
                <FailureTile failure={failure} />
              </div>
            ))}
          </div>

          <div style={{
            display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
            paddingTop: 24, borderTop: '1px solid #1c1c1f',
            fontFamily: '"IBM Plex Mono", monospace', fontSize: 11,
            letterSpacing: '0.12em', color: '#71717a',
          }}>
            <span>Showing {filtered.length} of {TOTAL_FAILURES} · {pillarFilter !== 'All' ? pillarFilter.toLowerCase() + ' only' : 'all pillars'}</span>
            <a href="#" style={{
              color: '#fafafa', textDecoration: 'none', borderBottom: '1px solid #3f3f46',
              paddingBottom: 2,
            }}>Explore all {TOTAL_FAILURES} failures →</a>
          </div>
        </section>
      );
    }

    function App() {
      return (
        <div style={{
          background: '#0a0a0c', color: '#fafafa', minHeight: '100vh',
          fontFamily: '"IBM Plex Sans", sans-serif',
        }}>
          <header style={{
            position: 'fixed', top: 0, left: 0, right: 0, zIndex: 50,
            padding: '20px 48px', display: 'flex',
            justifyContent: 'space-between', alignItems: 'center',
            background: 'rgba(10,10,12,0.75)', backdropFilter: 'blur(12px)',
            borderBottom: '1px solid #1c1c1f',
          }}>
            <div style={{
              fontFamily: '"IBM Plex Mono", monospace', fontSize: 13,
              letterSpacing: '0.05em', fontWeight: 600,
            }}>SVI-BENCH</div>
            <nav style={{
              display: 'flex', gap: 28,
              fontFamily: '"IBM Plex Mono", monospace',
              fontSize: 11, letterSpacing: '0.1em',
            }}>
              {['Paper', 'Code', 'Data', 'Team'].map((l) => (
                <a key={l} href="#" style={{
                  color: '#a1a1aa', textDecoration: 'none', textTransform: 'uppercase',
                }}>{l}</a>
              ))}
            </nav>
          </header>
          <TapeArchiveSection />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
