function smooth(t) {
  return t < 0 ? 0 : t > 1 ? 1 : t * t * (3 - 2 * t);
}
function lerp(a, b, t) {
  return a + (b - a) * t;
}
function piecewise(t, keyframes) {
  for (let i = 0; i < keyframes.length - 1; i++) {
    const k0 = keyframes[i],
      k1 = keyframes[i + 1];
    if (t >= k0.t && t <= k1.t) {
      const local = (t - k0.t) / (k1.t - k0.t);
      return lerp(k0.v, k1.v, smooth(local));
    }
  }
  return keyframes[keyframes.length - 1].v;
}
function useScrollProgress(ref) {
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      if (!ref.current) return;
      const rect = ref.current.getBoundingClientRect();
      const vh = window.innerHeight;
      const total = ref.current.offsetHeight - vh;
      const scrolled = -rect.top;
      const p = Math.max(0, Math.min(1, scrolled / total));
      setProgress(p);
    };
    window.addEventListener('scroll', onScroll, {
      passive: true
    });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, [ref]);
  return progress;
}
function usePlayClock(durationMs = 10000) {
  const [t, setT] = useState(0);
  useEffect(() => {
    let raf;
    const start = performance.now();
    const tick = now => {
      setT((now - start) % durationMs / durationMs);
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [durationMs]);
  return t;
}
