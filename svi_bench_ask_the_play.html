    // ===================== HELPERS =====================
    function smooth(t) { return t < 0 ? 0 : t > 1 ? 1 : t * t * (3 - 2 * t); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function piecewise(t, keyframes) {
      for (let i = 0; i < keyframes.length - 1; i++) {
        const k0 = keyframes[i], k1 = keyframes[i + 1];
        if (t >= k0.t && t <= k1.t) {
          const local = (t - k0.t) / (k1.t - k0.t);
          return lerp(k0.v, k1.v, smooth(local));
        }
      }
      return keyframes[keyframes.length - 1].v;
    }
    function usePlayClock(durationMs = 10000) {
      const [t, setT] = useState(0);
      useEffect(() => {
        let raf;
        const start = performance.now();
        const tick = (now) => {
          setT(((now - start) % durationMs) / durationMs);
          raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [durationMs]);
      return t;
    }

    // ===================== SCHEMATIC =====================
    const PLAY = {

      P2: {
        cx: [{t:0,v:230},{t:0.22,v:255},{t:0.4,v:220},{t:0.6,v:195},{t:0.78,v:180},{t:1,v:230}],

      P5: { cx: [{t:0,v:110},{t:0.5,v:115},{t:1,v:110}], cy: [{t:0,v:430},{t:0.5,v:435},{t:1,v:430}] },
      BALL: {
        cx: [{t:0,v:180},{t:0.25,v:235},{t:0.5,v:200},{t:0.55,v:190},{t:0.62,v:180},{t:0.78,v:180},{t:1,v:180}],
        cy: [{t:0,v:360},{t:0.25,v:330},{t:0.5,v:220},{t:0.55,v:170},{t:0.62,v:90},{t:0.78,v:70},{t:1,v:360}],
      },
    };
    function pos(motion, t) {
      return { cx: piecewise(t, motion.cx), cy: piecewise(t, motion.cy) };
    }

    function HalfCourt({ children }) {

          <circle cx={180} cy={150} r={36} fill="none" stroke="#27272a" strokeWidth={1} strokeDasharray="3 3" />

    function Player({ cx, cy, color, glow, highlight }) {
      return (
        <g>
          {highlight && <circle cx={cx} cy={cy} r={11} fill="none" stroke={color} strokeWidth={0.8} opacity={0.4} />}

        </g>

    function Defender({ cx, cy }) {
      return <circle cx={cx} cy={cy} r={5.5} fill="none" stroke="#52525b" strokeWidth={1.2} />;

    function PlayLoop({ t, pillarColor, glow }) {
      const p1 = pos(PLAY.P1, t);
      const p2 = pos(PLAY.P2, t);
      const p3 = pos(PLAY.P3, t);
      const p4 = pos(PLAY.P4, t);
      const p5 = pos(PLAY.P5, t);
      const ball = pos(PLAY.BALL, t);
      const passWindow = t > 0.50 && t < 0.66;
      const passAlpha = passWindow ? Math.sin(((t - 0.50) / 0.16) * Math.PI) : 0;
      return (
        <g>
          {t > 0.20 && t < 0.34 && (
            <circle cx={250} cy={280} r={20} fill="none" stroke="rgba(255,255,255,0.25)" strokeDasharray="2 3" strokeWidth={1} />

          <circle cx={ball.cx} cy={ball.cy} r={6} fill="rgba(250,250,250,0.18)" />
        </g>
      );
    }

    // ===================== REVEAL ENGINE =====================
    function useRevealEngine(clip, runKey) {
      const [stage, setStage] = useState('question');
      const [revealed, setRevealed] = useState([0, 0, 0]);
      const cancelRef = useRef(null);

      useEffect(() => {
        cancelRef.current = { cancelled: false };
        const ctx = cancelRef.current;
        setStage('question');
        setRevealed([0, 0, 0]);

        const sleep = (ms) => new Promise(r => setTimeout(r, ms));
        const SPEED = 22;
        const PAUSE = 500;

        async function run() {
          await sleep(900);
          if (ctx.cancelled) return;

          for (let i = 0; i < 3; i++) {
            setStage('m' + (i + 1));
            const text = clip.models[i].text;
            for (let c = 1; c <= text.length; c++) {
              if (ctx.cancelled) return;
              setRevealed(prev => {
                const next = [...prev];
                next[i] = c;
                return next;
              });
              await sleep(SPEED);
            }
            await sleep(PAUSE);
            if (ctx.cancelled) return;
          }

          setStage('gt');
          await sleep(2400);
          if (ctx.cancelled) return;
          setStage('verdict');
          await sleep(50);
          if (ctx.cancelled) return;
          setStage('done');
        }

        run();
        return () => { ctx.cancelled = true; };
      }, [clip.id, runKey]);

      const revealAll = useCallback(() => {
        if (cancelRef.current) cancelRef.current.cancelled = true;
        setRevealed(clip.models.map(m => m.text.length));
        setStage('done');
      }, [clip]);

      return { stage, revealed, revealAll };
    }

    // ===================== VIEWPORT =====================

              <div style={{ height: '100%', width: `${playT * 100}%`, background: c.base, transition: 'background 300ms' }} />
            </div>
            <span style={{
              fontFamily: '"IBM Plex Mono", monospace', fontSize: 10, color: '#0a0a0c', letterSpacing: '0.12em',
              background: c.base, padding: '3px 8px', borderRadius: 2, fontWeight: 600, textTransform: 'uppercase',
            }}>{clip.pillar}</span>
          </div>
        </div>
      );
    }

    // ===================== ANSWER CARDS =====================
    function QuestionCard({ question }) {
      return (
        <div style={{
          padding: '12px 14px',

          border: '1px solid #27272a',

            fontFamily: '"IBM Plex Mono", monospace', fontSize: 10,
            color: '#71717a', letterSpacing: '0.18em',
            textTransform: 'uppercase', marginBottom: 6,
          }}>Question</div>
          <div style={{
            fontFamily: '"IBM Plex Sans", sans-serif', fontSize: 14,
            lineHeight: 1.4, color: '#fafafa',
          }}>{question}</div>
        </div>
      );
    }

    function ModelAnswerCard({ model, charCount, isStreaming, isComplete, isUpcoming }) {
      const visible = model.text.slice(0, charCount);
      const showCursor = isStreaming && charCount < model.text.length;
      return (
        <div style={{
          padding: '11px 14px',
          background: 'rgba(20,20,24,0.55)',
          border: `1px solid ${isStreaming ? '#3f3f46' : '#27272a'}`,
          borderRadius: 3,
          opacity: isUpcoming ? 0.3 : 1,
          transition: 'opacity 400ms ease, border-color 400ms ease',
          animation: 'fadeSlide 300ms ease',
        }}>
          <div style={{
            display: 'flex', justifyContent: 'space-between',
            fontFamily: '"IBM Plex Mono", monospace', fontSize: 10,
            color: '#71717a', letterSpacing: '0.12em', marginBottom: 5,
            textTransform: 'uppercase',
          }}>
            <span>{model.name}{isStreaming ? ' · streaming' : ''}</span>
            <span style={{ color: isComplete ? (model.wrong ? '#C0392B' : '#a1a1aa') : '#52525b' }}>
              {isComplete ? model.score : '—'}
            </span>
          </div>
          <div style={{
            fontFamily: '"IBM Plex Sans", sans-serif', fontSize: 13,
            lineHeight: 1.5, color: '#d4d4d8',
            minHeight: '1.5em',
          }}>
            {visible}
            {showCursor && (
              <span style={{
                display: 'inline-block', width: 7, height: 14,
                background: '#fafafa', marginLeft: 2, verticalAlign: '-2px',
                animation: 'cursorBlink 0.9s steps(1) infinite',
              }} />
            )}
          </div>
        </div>
      );
    }

    function GTCard({ gt, pillarColor, soft, visible }) {
      return (
        <div style={{
          padding: '11px 14px',
          background: soft,
          border: `1px solid ${pillarColor}`,
          borderRadius: 3,
          opacity: visible ? 1 : 0,
          transform: visible ? 'translateY(0)' : 'translateY(8px)',
          transition: 'opacity 500ms ease, transform 500ms ease',
        }}>
          <div style={{
            display: 'flex', justifyContent: 'space-between',
            fontFamily: '"IBM Plex Mono", monospace', fontSize: 10,
            color: pillarColor, letterSpacing: '0.15em', marginBottom: 5,
            textTransform: 'uppercase', fontWeight: 600,
          }}>
            <span>Human · ground truth</span>
            <span>✓</span>
          </div>
          <div style={{
            fontFamily: '"IBM Plex Sans", sans-serif', fontSize: 13,
            lineHeight: 1.5, color: '#fafafa', fontWeight: 500,
          }}>{gt}</div>
        </div>
      );
    }

    function VerdictLine({ headline, visible }) {
      return (
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          fontFamily: '"IBM Plex Mono", monospace', fontSize: 10,
          color: '#a1a1aa', letterSpacing: '0.15em', textTransform: 'uppercase',
          paddingTop: 8,
          borderTop: '1px solid #1c1c1f',
          opacity: visible ? 1 : 0,
          transform: visible ? 'translateY(0)' : 'translateY(6px)',
          transition: 'opacity 500ms ease, transform 500ms ease',
        }}>
          <span style={{ color: '#C0392B', fontWeight: 600 }}>Judge verdict</span>
          <span>{headline}</span>
        </div>
      );
    }

    // ===================== ANALYSIS PANEL =====================
    function AnalysisPanel({ clip, runKey, onReplay }) {
      const { stage, revealed, revealAll } = useRevealEngine(clip, runKey);
      const c = PILLARS[clip.pillar];

      const stageNum = { question: 0, m1: 1, m2: 2, m3: 3, gt: 4, verdict: 5, done: 5 }[stage];
      const isM = (i) => stage === 'm' + (i + 1);
      const completed = (i) => stageNum > i + 1 || stage === 'done' || stage === 'gt' || stage === 'verdict';
      const upcoming = (i) => stageNum < i + 1;
      const showGT = stage === 'gt' || stage === 'verdict' || stage === 'done';
      const showVerdict = stage === 'verdict' || stage === 'done';

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, height: '100%', justifyContent: 'flex-start' }}>
          <QuestionCard question={clip.question} />
          {clip.models.map((m, i) => (
            <ModelAnswerCard
              key={i}
              model={m}
              charCount={revealed[i]}
              isStreaming={isM(i)}
              isComplete={completed(i)}
              isUpcoming={upcoming(i)}
            />
          ))}
          <GTCard gt={clip.gt} pillarColor={c.base} soft={c.soft} visible={showGT} />
          <VerdictLine headline={clip.verdictHeadline} visible={showVerdict} />

          <div style={{
            display: 'flex', justifyContent: 'flex-end', gap: 10,
            paddingTop: 4,
          }}>
            {stage !== 'done' && stage !== 'verdict' && (
              <button onClick={revealAll} style={{
                background: 'transparent', border: '1px solid #27272a', borderRadius: 2,
                color: '#a1a1aa', padding: '5px 11px',
                fontFamily: '"IBM Plex Mono", monospace', fontSize: 10,
                letterSpacing: '0.12em', textTransform: 'uppercase',
              }}>↪ Reveal all</button>
            )}
            {(stage === 'done' || stage === 'verdict') && (
              <button onClick={onReplay} style={{
                background: 'transparent', border: '1px solid #27272a', borderRadius: 2,
                color: '#a1a1aa', padding: '5px 11px',
                fontFamily: '"IBM Plex Mono", monospace', fontSize: 10,
                letterSpacing: '0.12em', textTransform: 'uppercase',
              }}>↻ Replay</button>
            )}
          </div>
        </div>
      );
    }

    // ===================== CLIP PICKER =====================
    function ClipCard({ clip, isActive, onClick }) {
      const c = PILLARS[clip.pillar];
      return (
        <button onClick={onClick} style={{
          flex: 1, minWidth: 0,
          padding: isActive ? 6 : 7,
          background: isActive ? '#14141a' : 'rgba(20,20,24,0.4)',
          border: isActive ? `2px solid ${c.base}` : '1px solid #27272a',
          borderRadius: 4,
          textAlign: 'left',
          display: 'flex', flexDirection: 'column', gap: 6,
          transition: 'all 200ms ease',
          color: 'inherit',
        }}>
          <div style={{
            aspectRatio: '4 / 3',
            background: '#0c0d10',
            border: '1px solid #1c1c1f',
            borderRadius: 2,
            overflow: 'hidden',
            opacity: isActive ? 1 : 0.65,
          }}>
            <StaticCourtThumb pillarColor={c.base} />
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{
              fontFamily: '"IBM Plex Mono", monospace', fontSize: 11,
              color: c.base, fontWeight: 600,
            }}>{clip.taskId}</span>
            <span style={{
              fontFamily: '"IBM Plex Sans", sans-serif', fontSize: 11,
              color: isActive ? '#e4e4e7' : '#71717a',
              whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
            }}>{clip.teaser}</span>
          </div>
        </button>
      );
    }

    function ClipPicker({ clips, selectedId, onSelect }) {
      return (
        <div style={{ display: 'flex', gap: 10 }}>
          {clips.map((clip) => (
            <ClipCard
              key={clip.id}
              clip={clip}
              isActive={clip.id === selectedId}
              onClick={() => onSelect(clip.id)}
            />
          ))}
        </div>
      );
    }

    // ===================== SECTION =====================
    function AskThePlaySection() {
      const [selectedId, setSelectedId] = useState('c3');
      const [runKey, setRunKey] = useState(0);
      const playT = usePlayClock(10000);
      const clip = CLIPS.find(c => c.id === selectedId);

      const onSelect = (id) => {
        setSelectedId(id);
        setRunKey(k => k + 1);
      };
      const onReplay = () => setRunKey(k => k + 1);

      return (
        <section style={{
          minHeight: '100vh',
          padding: '110px 48px 60px',
          maxWidth: 1500, margin: '0 auto',
          display: 'flex', flexDirection: 'column',
        }}>
          <div style={{ marginBottom: 32 }}>
            <div style={{
              fontFamily: '"IBM Plex Mono", monospace', fontSize: 11,
              letterSpacing: '0.2em', textTransform: 'uppercase',
              color: '#71717a', marginBottom: 16,
            }}>03 · Ask the play</div>
            <h2 style={{
              fontFamily: '"IBM Plex Serif", serif',
              fontSize: 'clamp(40px, 6vw, 76px)', fontWeight: 400,
              lineHeight: 1, letterSpacing: '-0.02em',
              margin: 0, marginBottom: 18, maxWidth: 1000,
            }}>
              Where does the model crack?
            </h2>
            <p style={{
              fontFamily: '"IBM Plex Sans", sans-serif', fontSize: 16,
              lineHeight: 1.5, color: '#a1a1aa', maxWidth: 680,
              margin: 0,
            }}>
              Pick a clip. Watch three frontier video models answer beside the human expert.
              The judge verdict reveals on a beat.
            </p>
          </div>

          <div style={{
            display: 'grid',
            gridTemplateColumns: '1.35fr 1fr',
            gap: 28,
            marginBottom: 24,
            flex: 1,
            minHeight: 0,
          }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              <BroadcastViewport clip={clip} playT={playT} />
            </div>
            <div style={{ minHeight: 0 }}>
              <AnalysisPanel clip={clip} runKey={runKey} onReplay={onReplay} />
            </div>
          </div>

          <ClipPicker clips={CLIPS} selectedId={selectedId} onSelect={onSelect} />
        </section>
      );
    }

    // ===================== APP =====================
    function App() {
      return (
        <div style={{
          background: '#0a0a0c', color: '#fafafa', minHeight: '100vh',
          fontFamily: '"IBM Plex Sans", sans-serif',
        }}>
          <header style={{
            position: 'fixed', top: 0, left: 0, right: 0, zIndex: 50,
            padding: '20px 48px', display: 'flex',
            justifyContent: 'space-between', alignItems: 'center',
            background: 'rgba(10,10,12,0.75)', backdropFilter: 'blur(12px)',
            borderBottom: '1px solid #1c1c1f',
          }}>
            <div style={{
              fontFamily: '"IBM Plex Mono", monospace', fontSize: 13,
              letterSpacing: '0.05em', fontWeight: 600,
            }}>SVI-BENCH</div>
            <nav style={{
              display: 'flex', gap: 28,
              fontFamily: '"IBM Plex Mono", monospace',
              fontSize: 11, letterSpacing: '0.1em',
            }}>
              {['Paper', 'Code', 'Data', 'Team'].map((l) => (
                <a key={l} href="#" style={{
                  color: '#a1a1aa', textDecoration: 'none', textTransform: 'uppercase',
                }}>{l}</a>
              ))}
            </nav>
          </header>
          <AskThePlaySection />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
