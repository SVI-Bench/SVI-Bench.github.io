<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVI-Bench — The Performance Cliff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Serif:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0a0a0c; }
    body { font-family: "IBM Plex Sans", sans-serif; color: #fafafa; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes subtlePulse {
      0%, 100% { opacity: 0.4; }
      50%      { opacity: 0.85; }
    }
    @keyframes recPulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.35; }
    }
    @keyframes overlayIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    a { color: inherit; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useEffect, useRef, useState } = React;

    // ---------- DATA ----------
    const TASKS = [
      { id: 'T1', name: 'Structured Play Description',    pillar: 'Perception', score: 52, metric: '2.59 / 5', metricLabel: 'judge score',  bestModel: 'LLaVA-Video-7B (ft)',     blurb: 'Describe a 10-second play. Models name actions but mix up jersey numbers and player identities.' },
      { id: 'T2', name: 'Fine-Grained Action QA',         pillar: 'Perception', score: 74, metric: '73.9%',    metricLabel: 'accuracy',     bestModel: 'LLaVA-Video-7B (ft)',     blurb: 'Multiple-choice questions about who did what. Fine-tuned models clear 70% — the field can see.' },
      { id: 'T3', name: 'Compositional Video Retrieval',  pillar: 'Perception', score: 12, metric: '12.3%',    metricLabel: 'R@10',         bestModel: 'best baseline',           blurb: 'Find the clip matching a fine-grained query. Models retrieve the right scene but the wrong detail.' },
      { id: 'T4', name: 'Strategic Reasoning QA',         pillar: 'Reasoning',  score: 40, metric: '1.99 / 5', metricLabel: 'judge score',  bestModel: 'GPT-5.2',                 blurb: 'Why did the play work? Models propose plausible tactics that contradict the visual evidence.' },
      { id: 'T5', name: 'Outcome Forecasting',            pillar: 'Reasoning',  score: 45, metric: '44.8%',    metricLabel: 'accuracy',     bestModel: 'Qwen3-VL-8B (ft)',        blurb: 'Predict what happens next. Models are confident and wrong — calibration error of 28 points.' },
      { id: 'T6', name: 'Long-Form Narrative Synthesis',  pillar: 'Reasoning',  score: 7,  metric: '7.3%',     metricLabel: 'saliency',     bestModel: 'best baseline',           blurb: 'Summarize a full game. Facts are mostly right (73%). Almost none of the salient events appear.' },
      { id: 'T7', name: 'Motion-Conditioned Generation',  pillar: 'Simulation', score: 51, metric: '0.513',    metricLabel: 'video mIoU',   bestModel: 'best baseline',           blurb: 'Generate video that follows prescribed trajectories. About half of player positions drift.' },
      { id: 'T8', name: 'Goal-Conditioned Action Gen.',   pillar: 'Simulation', score: 50, metric: '50.2%',    metricLabel: 'goal accuracy',bestModel: 'best baseline',           blurb: 'Generate the action that scores. Goal-conditioned planning sits barely above chance.' },
      { id: 'T9', name: 'Cross-Corpus Agentic Reasoning', pillar: 'Agency',     score: 6,  metric: '5.6%',     metricLabel: 'accuracy',     bestModel: 'GPT-5.2',                 blurb: 'Plan, search, and synthesize across video and text. Frontier agents reach 6% — the floor of the cliff.' },
    ];

    const PILLARS = {
      Perception: { base: '#4A7FB5', glow: 'rgba(74,127,181,0.55)', soft: 'rgba(74,127,181,0.12)' },
      Reasoning:  { base: '#2E9E8F', glow: 'rgba(46,158,143,0.55)', soft: 'rgba(46,158,143,0.12)' },
      Simulation: { base: '#D4913A', glow: 'rgba(212,145,58,0.55)', soft: 'rgba(212,145,58,0.12)' },
      Agency:     { base: '#C0392B', glow: 'rgba(192,57,43,0.55)',  soft: 'rgba(192,57,43,0.12)' },
    };

    const PILLAR_ORDER = ['Perception', 'Reasoning', 'Simulation', 'Agency'];

    // ---------- HELPERS ----------
    function useScrollProgress(ref) {
      const [progress, setProgress] = useState(0);
      useEffect(() => {
        const onScroll = () => {
          if (!ref.current) return;
          const rect = ref.current.getBoundingClientRect();
          const vh = window.innerHeight;
          const total = ref.current.offsetHeight - vh;
          const scrolled = -rect.top;
          const p = Math.max(0, Math.min(1, scrolled / total));
          setProgress(p);
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, [ref]);
      return progress;
    }

    function usePlayClock(durationMs = 10000) {
      const [t, setT] = useState(0);
      useEffect(() => {
        let raf;
        const start = performance.now();
        const tick = (now) => {
          setT(((now - start) % durationMs) / durationMs);
          raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [durationMs]);
      return t;
    }

    function smooth(t) { return t < 0 ? 0 : t > 1 ? 1 : t * t * (3 - 2 * t); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function piecewise(t, keyframes) {
      for (let i = 0; i < keyframes.length - 1; i++) {
        const k0 = keyframes[i], k1 = keyframes[i + 1];
        if (t >= k0.t && t <= k1.t) {
          const local = (t - k0.t) / (k1.t - k0.t);
          return lerp(k0.v, k1.v, smooth(local));
        }
      }
      return keyframes[keyframes.length - 1].v;
    }

    // ---------- BASKETBALL SCHEMATIC ----------
    function HalfCourt({ children }) {
      return (
        <svg viewBox="0 0 360 480" style={{ width: '100%', height: '100%', display: 'block' }}>
          <rect x={0} y={0} width={360} height={480} fill="#0c0d10" />
          <rect x={20} y={20} width={320} height={440} fill="none" stroke="#27272a" strokeWidth={1.2} />
          <rect x={130} y={20} width={100} height={130} fill="rgba(255,255,255,0.025)" stroke="#27272a" strokeWidth={1} />
          <line x1={130} y1={150} x2={230} y2={150} stroke="#27272a" strokeWidth={1} />
          <circle cx={180} cy={150} r={36} fill="none" stroke="#27272a" strokeWidth={1} strokeDasharray="3 3" />
          <line x1={158} y1={32} x2={202} y2={32} stroke="#3f3f46" strokeWidth={2.5} />
          <circle cx={180} cy={42} r={6} fill="none" stroke="#3f3f46" strokeWidth={1.5} />
          <path d="M 162 50 A 18 18 0 0 0 198 50" fill="none" stroke="#27272a" strokeWidth={1} />
          <line x1={50} y1={20} x2={50} y2={150} stroke="#27272a" strokeWidth={1} />
          <line x1={310} y1={20} x2={310} y2={150} stroke="#27272a" strokeWidth={1} />
          <path d="M 50 150 A 130 130 0 0 0 310 150" fill="none" stroke="#27272a" strokeWidth={1} />
          <line x1={20} y1={460} x2={340} y2={460} stroke="#27272a" strokeWidth={1} />
          {children}
        </svg>
      );
    }

    const PLAY = {
      P1: {
        cx: [{t:0,v:180},{t:0.25,v:235},{t:0.5,v:200},{t:0.7,v:175},{t:0.85,v:175},{t:1,v:180}],
        cy: [{t:0,v:360},{t:0.25,v:330},{t:0.5,v:220},{t:0.7,v:220},{t:0.85,v:230},{t:1,v:360}],
      },
      P2: {
        cx: [{t:0,v:230},{t:0.22,v:255},{t:0.4,v:220},{t:0.6,v:195},{t:0.78,v:180},{t:1,v:230}],
        cy: [{t:0,v:180},{t:0.22,v:285},{t:0.4,v:230},{t:0.6,v:130},{t:0.78,v:70},{t:1,v:180}],
      },
      P3: {
        cx: [{t:0,v:65},{t:0.5,v:70},{t:1,v:65}],
        cy: [{t:0,v:290},{t:0.5,v:300},{t:1,v:290}],
      },
      P4: {
        cx: [{t:0,v:300},{t:0.5,v:295},{t:1,v:300}],
        cy: [{t:0,v:390},{t:0.5,v:400},{t:1,v:390}],
      },
      P5: {
        cx: [{t:0,v:110},{t:0.5,v:115},{t:1,v:110}],
        cy: [{t:0,v:430},{t:0.5,v:435},{t:1,v:430}],
      },
      BALL: {
        cx: [{t:0,v:180},{t:0.25,v:235},{t:0.5,v:200},{t:0.55,v:190},{t:0.62,v:180},{t:0.78,v:180},{t:1,v:180}],
        cy: [{t:0,v:360},{t:0.25,v:330},{t:0.5,v:220},{t:0.55,v:170},{t:0.62,v:90},{t:0.78,v:70},{t:1,v:360}],
      },
    };

    function pos(motion, t) {
      return { cx: piecewise(t, motion.cx), cy: piecewise(t, motion.cy) };
    }

    function Player({ cx, cy, color, glow, highlight }) {
      return (
        <g>
          {highlight && <circle cx={cx} cy={cy} r={11} fill="none" stroke={color} strokeWidth={0.8} opacity={0.4} />}
          <circle cx={cx} cy={cy} r={7} fill={color} style={{ filter: highlight ? `drop-shadow(0 0 6px ${glow})` : undefined }} />
        </g>
      );
    }
    function Defender({ cx, cy }) {
      return <circle cx={cx} cy={cy} r={5.5} fill="none" stroke="#52525b" strokeWidth={1.2} />;
    }

    function PlayLoop({ t, pillarColor, glow }) {
      const p1 = pos(PLAY.P1, t);
      const p2 = pos(PLAY.P2, t);
      const p3 = pos(PLAY.P3, t);
      const p4 = pos(PLAY.P4, t);
      const p5 = pos(PLAY.P5, t);
      const ball = pos(PLAY.BALL, t);
      const passWindow = t > 0.50 && t < 0.66;
      const passAlpha = passWindow ? Math.sin(((t - 0.50) / 0.16) * Math.PI) : 0;

      return (
        <g>
          {t > 0.20 && t < 0.34 && (
            <circle cx={250} cy={280} r={20} fill="none"
                    stroke="rgba(255,255,255,0.25)" strokeDasharray="2 3" strokeWidth={1} />
          )}
          {passAlpha > 0.05 && (
            <path d={`M 200 220 Q 185 130 180 75`} fill="none"
                  stroke="rgba(255,255,255,0.55)" strokeWidth={1.2}
                  strokeDasharray="3 3" opacity={passAlpha} />
          )}
          <Defender cx={p1.cx + 4} cy={p1.cy + 14} />
          <Defender cx={p2.cx - 6} cy={p2.cy + 16} />
          <Defender cx={p3.cx + 14} cy={p3.cy + 4} />
          <Defender cx={p4.cx - 14} cy={p4.cy - 6} />
          <Defender cx={p5.cx + 12} cy={p5.cy - 12} />
          <Player cx={p1.cx} cy={p1.cy} color={pillarColor} glow={glow} highlight />
          <Player cx={p2.cx} cy={p2.cy} color={pillarColor} glow={glow} highlight={t > 0.6} />
          <Player cx={p3.cx} cy={p3.cy} color={pillarColor} glow={glow} />
          <Player cx={p4.cx} cy={p4.cy} color={pillarColor} glow={glow} />
          <Player cx={p5.cx} cy={p5.cy} color={pillarColor} glow={glow} />
          <circle cx={ball.cx} cy={ball.cy} r={3.5} fill="#fafafa" stroke="rgba(0,0,0,0.4)" strokeWidth={0.5} />
          <circle cx={ball.cx} cy={ball.cy} r={6} fill="rgba(250,250,250,0.18)" />
        </g>
      );
    }

    // ---------- TASK OVERLAYS ----------
    function CaptionRow({ label, color, text, dim }) {
      return (
        <div style={{
          display: 'flex', gap: 10, alignItems: 'flex-start',
          padding: '8px 10px',
          background: 'rgba(10,10,12,0.65)',
          border: `1px solid ${color}`,
          borderRadius: 2,
          backdropFilter: 'blur(6px)',
          animation: 'overlayIn 400ms ease',
        }}>
          <span style={{
            fontFamily: '"IBM Plex Mono", monospace',
            fontSize: 9, letterSpacing: '0.15em',
            color, fontWeight: 600, paddingTop: 2,
            minWidth: 38, textTransform: 'uppercase',
          }}>{label}</span>
          <span style={{
            fontFamily: '"IBM Plex Sans", sans-serif',
            fontSize: 12, lineHeight: 1.35,
            color: dim ? '#a1a1aa' : '#e4e4e7',
          }}>{text}</span>
        </div>
      );
    }

    function T1Overlay({ pillar }) {
      const c = PILLARS[pillar];
      return (
        <div style={{ position: 'absolute', left: 16, right: 16, bottom: 38, display: 'flex', flexDirection: 'column', gap: 6 }}>
          <CaptionRow label="GT" color={c.base} text="Point guard uses high ball-screen, drives middle, kicks to rolling big for a finish at the rim." />
          <CaptionRow label="MODEL" color="#C0392B" dim
            text={<span>Player #<s style={{textDecorationColor:'#C0392B'}}>4</s> dribbles, passes to #<s style={{textDecorationColor:'#C0392B'}}>23</s>, who shoots a layup.</span>} />
        </div>
      );
    }

    function T2Overlay({ pillar }) {
      const c = PILLARS[pillar];
      const options = [
        { l: 'A', text: 'pull-up jumper' },
        { l: 'B', text: 'step-back three' },
        { l: 'C', text: 'drive & dish, finish at rim', correct: true },
        { l: 'D', text: 'fadeaway from elbow' },
      ];
      const modelPick = 'B';
      return (
        <div style={{ position: 'absolute', right: 12, top: 38, bottom: 38, width: 200, display: 'flex', flexDirection: 'column', gap: 6 }}>
          <div style={{
            fontFamily: '"IBM Plex Mono", monospace', fontSize: 9.5, letterSpacing: '0.1em',
            color: '#a1a1aa', textTransform: 'uppercase', marginBottom: 2,
          }}>Q · what preceded the basket?</div>
          {options.map((o) => {
            const isCorrect = o.correct;
            const isPicked = o.l === modelPick;
            const border = isCorrect ? c.base : isPicked ? '#C0392B' : '#27272a';
            return (
              <div key={o.l} style={{
                display: 'flex', gap: 8, alignItems: 'center',
                padding: '5px 8px',
                background: 'rgba(10,10,12,0.7)',
                border: `1px solid ${border}`,
                borderRadius: 2,
                fontFamily: '"IBM Plex Sans", sans-serif', fontSize: 10.5,
                color: isCorrect ? c.base : isPicked ? '#C0392B' : '#a1a1aa',
                animation: 'overlayIn 400ms ease',
              }}>
                <span style={{ fontFamily: '"IBM Plex Mono", monospace', fontWeight: 600, minWidth: 12 }}>{o.l}</span>
                <span>{o.text}</span>
                {isCorrect && <span style={{ marginLeft: 'auto', fontFamily: '"IBM Plex Mono", monospace', fontSize: 9 }}>GT</span>}
                {isPicked && !isCorrect && <span style={{ marginLeft: 'auto', fontFamily: '"IBM Plex Mono", monospace', fontSize: 9 }}>MODEL</span>}
              </div>
            );
          })}
        </div>
      );
    }

    function T3Overlay({ pillar }) {
      const c = PILLARS[pillar];
      const thumbs = [
        { match: false },
        { match: true,  modelPick: false },
        { match: false, modelPick: true },
        { match: false },
      ];
      return (
        <div style={{ position: 'absolute', right: 12, top: 38, bottom: 38, width: 130, display: 'flex', flexDirection: 'column', gap: 8 }}>
          <div style={{
            fontFamily: '"IBM Plex Mono", monospace', fontSize: 9, letterSpacing: '0.1em',
            color: '#a1a1aa', textTransform: 'uppercase',
            padding: '5px 8px',
            border: '1px solid #27272a',
            background: 'rgba(10,10,12,0.7)',
            borderRadius: 2,
          }}>"pick-and-roll · big finishes at the rim"</div>
          {thumbs.map((th, i) => {
            const isMatch = th.match;
            const isPicked = th.modelPick;
            const border = isMatch ? c.base : isPicked ? '#C0392B' : '#27272a';
            return (
              <div key={i} style={{
                aspectRatio: '4 / 3', borderRadius: 2,
                background: 'linear-gradient(135deg, #18181b 0%, #0c0d10 100%)',
                border: `1px solid ${border}`,
                position: 'relative',
                animation: 'overlayIn 400ms ease',
              }}>
                <div style={{
                  position: 'absolute', top: 4, left: 6,
                  fontFamily: '"IBM Plex Mono", monospace', fontSize: 8,
                  letterSpacing: '0.1em',
                  color: isMatch ? c.base : isPicked ? '#C0392B' : '#52525b',
                }}>{`#${String(i+1).padStart(2,'0')}`}</div>
                {isMatch && <div style={{
                  position: 'absolute', bottom: 4, right: 6,
                  fontFamily: '"IBM Plex Mono", monospace', fontSize: 9, color: c.base,
                }}>GT</div>}
                {isPicked && <div style={{
                  position: 'absolute', bottom: 4, right: 6,
                  fontFamily: '"IBM Plex Mono", monospace', fontSize: 9, color: '#C0392B',
                }}>MODEL</div>}
              </div>
            );
          })}
        </div>
      );
    }

    function T4Overlay({ pillar }) {
      const c = PILLARS[pillar];
      return (
        <div style={{ position: 'absolute', left: 16, right: 16, bottom: 38, display: 'flex', flexDirection: 'column', gap: 6 }}>
          <div style={{
            fontFamily: '"IBM Plex Sans", sans-serif', fontSize: 12,
            color: '#fafafa', fontWeight: 500,
            padding: '8px 10px',
            background: 'rgba(10,10,12,0.7)',
            border: '1px solid #27272a',
            borderRadius: 2,
          }}>Q · Why was the defense unable to recover on this pick-and-roll?</div>
          <CaptionRow label="MODEL" color="#C0392B" dim
            text="The defenders failed to switch on the screen, and the ball-handler got an open three." />
          <CaptionRow label="GT" color={c.base}
            text="Screener's defender hedged hard; the roller had a free lane with no help defender rotating in time." />
        </div>
      );
    }

    function T5Overlay({ pillar }) {
      const c = PILLARS[pillar];
      const outcomes = [
        { l: 'made 2', model: 0.62, truth: false },
        { l: 'foul drawn', model: 0.10, truth: true },
        { l: 'missed shot', model: 0.18, truth: false },
        { l: 'turnover', model: 0.10, truth: false },
      ];
      const maxModel = Math.max(...outcomes.map(x => x.model));
      return (
        <div style={{ position: 'absolute', right: 12, top: 38, bottom: 38, width: 190, display: 'flex', flexDirection: 'column', gap: 7 }}>
          <div style={{
            fontFamily: '"IBM Plex Mono", monospace', fontSize: 9.5, letterSpacing: '0.1em',
            color: '#a1a1aa', textTransform: 'uppercase',
          }}>predict next outcome</div>
          {outcomes.map((o) => {
            const isTruth = o.truth;
            const isModelTop = o.model === maxModel;
            return (
              <div key={o.l} style={{
                fontFamily: '"IBM Plex Mono", monospace', fontSize: 10,
                animation: 'overlayIn 400ms ease',
              }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 2 }}>
                  <span style={{ color: isTruth ? c.base : isModelTop ? '#C0392B' : '#a1a1aa' }}>
                    {o.l}{isTruth && ' · GT'}
                  </span>
                  <span style={{ color: isModelTop ? '#C0392B' : '#52525b' }}>{(o.model*100).toFixed(0)}%</span>
                </div>
                <div style={{ height: 4, background: '#1c1c1f', borderRadius: 1, overflow: 'hidden' }}>
                  <div style={{
                    height: '100%', width: `${o.model*100}%`,
                    background: isTruth ? c.base : isModelTop ? '#C0392B' : '#3f3f46',
                  }} />
                </div>
              </div>
            );
          })}
          <div style={{
            marginTop: 4, fontFamily: '"IBM Plex Mono", monospace', fontSize: 9,
            color: '#71717a', letterSpacing: '0.1em', textTransform: 'uppercase',
          }}>calibration error: 28 pts</div>
        </div>
      );
    }

    function T6Overlay({ pillar }) {
      const c = PILLARS[pillar];
      const events = Array.from({ length: 14 }, (_, i) => ({
        salient: [2, 5, 8, 11, 13].includes(i),
        covered: i === 5,
      }));
      return (
        <div style={{ position: 'absolute', left: 16, right: 16, bottom: 38, display: 'flex', flexDirection: 'column', gap: 8 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: '"IBM Plex Mono", monospace', fontSize: 10, letterSpacing: '0.1em', color: '#a1a1aa', textTransform: 'uppercase' }}>
            <span>game timeline · salient events</span>
            <span style={{ color: c.base }}>saliency 7.3%</span>
          </div>
          <div style={{ position: 'relative', height: 36, background: 'rgba(10,10,12,0.7)', border: '1px solid #27272a', borderRadius: 2 }}>
            <div style={{ position: 'absolute', top: '50%', left: 8, right: 8, height: 1, background: '#27272a' }} />
            {events.map((e, i) => {
              const left = `${(i + 0.5) / events.length * 100}%`;
              return (
                <div key={i} style={{ position: 'absolute', left, top: '50%', transform: 'translate(-50%, -50%)' }}>
                  <div style={{
                    width: e.salient ? 8 : 4, height: e.salient ? 8 : 4,
                    borderRadius: '50%',
                    background: e.covered ? c.base : e.salient ? '#52525b' : '#3f3f46',
                    boxShadow: e.covered ? `0 0 8px ${c.glow}` : 'none',
                  }} />
                </div>
              );
            })}
          </div>
          <div style={{ display: 'flex', gap: 14, fontFamily: '"IBM Plex Mono", monospace', fontSize: 9, color: '#71717a', letterSpacing: '0.1em', textTransform: 'uppercase' }}>
            <span><span style={{ display: 'inline-block', width: 6, height: 6, borderRadius: 3, background: c.base, marginRight: 6, verticalAlign: 'middle' }} />covered</span>
            <span><span style={{ display: 'inline-block', width: 6, height: 6, borderRadius: 3, background: '#52525b', marginRight: 6, verticalAlign: 'middle' }} />salient · missed</span>
          </div>
        </div>
      );
    }

    function T7Overlay({ pillar }) {
      const c = PILLARS[pillar];
      return (
        <>
          <svg viewBox="0 0 360 480" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none' }}>
            <path d="M 180 360 Q 235 280 200 200 Q 175 150 180 75" fill="none" stroke="#fafafa" strokeWidth={1.6} strokeDasharray="4 4" />
            <path d="M 180 360 Q 245 290 215 215 Q 220 175 245 130 Q 270 100 260 70" fill="none" stroke={c.base} strokeWidth={1.6} />
            <circle cx={260} cy={70} r={6} fill={c.base} opacity={0.85} />

    function Legend({ swatch, label, dashed }) {
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontFamily: '"IBM Plex Mono", monospace', fontSize: 9.5, color: '#a1a1aa', letterSpacing: '0.1em', textTransform: 'uppercase', padding: '4px 8px', background: 'rgba(10,10,12,0.7)', border: '1px solid #27272a', borderRadius: 2 }}>

            display: 'inline-block', width: 14, height: 2, background: dashed ? 'transparent' : swatch,
            borderTop: dashed ? `1px dashed ${swatch}` : 'none',
          }} />
          {label}
        </div>
      );
    }

    function ToolCallTree({ pillar }) {
      const c = PILLARS[pillar];
      const nodes = [
        { id: 'root', x: 50, y: 240, label: 'query' },
        { id: 'vs',   x: 130, y: 130, label: 'video_search' },
        { id: 'ds',   x: 130, y: 240, label: 'doc_search' },
        { id: 'vq',   x: 130, y: 350, label: 'video_qa' },
        { id: 'l1',   x: 240, y: 80,  label: 'doc_qa' },
        { id: 'l2',   x: 240, y: 160, label: 'doc_qa' },
        { id: 'l3',   x: 240, y: 220, label: 'doc_qa' },
        { id: 'l4',   x: 240, y: 280, label: 'video_qa' },
        { id: 'l5',   x: 240, y: 360, label: 'doc_qa' },
        { id: 'e1', x: 320, y: 60,  outcome: 'fail' },
        { id: 'e2', x: 320, y: 100, outcome: 'fail' },
        { id: 'e3', x: 320, y: 150, outcome: 'success' },
        { id: 'e4', x: 320, y: 190, outcome: 'fail' },
        { id: 'e5', x: 320, y: 220, outcome: 'fail' },
        { id: 'e6', x: 320, y: 250, outcome: 'fail' },
        { id: 'e7', x: 320, y: 290, outcome: 'fail' },
        { id: 'e8', x: 320, y: 330, outcome: 'fail' },
        { id: 'e9', x: 320, y: 390, outcome: 'fail' },
      ];
      const edges = [
        ['root','vs'], ['root','ds'], ['root','vq'],
        ['vs','l1'], ['vs','l2'],
        ['ds','l3'], ['ds','l4'],
        ['vq','l5'],
        ['l1','e1'], ['l2','e2'], ['l2','e3'],
        ['l3','e4'], ['l3','e5'], ['l4','e6'], ['l4','e7'],
        ['l5','e8'], ['l5','e9'],
      ];
      const find = (id) => nodes.find(n => n.id === id);
      // Path-to-success set
      const successPath = new Set(['root','vs','l2','e3']);

      return (
        <svg viewBox="0 0 360 480" style={{ width: '100%', height: '100%', display: 'block' }}>
          <rect x={0} y={0} width={360} height={480} fill="#0c0d10" />
          {edges.map(([a, b], i) => {
            const na = find(a), nb = find(b);
            const onSuccessPath = successPath.has(a) && successPath.has(b);
            return (
              <line key={i} x1={na.x} y1={na.y} x2={nb.x} y2={nb.y}
                    stroke={onSuccessPath ? c.base : '#27272a'}
                    strokeWidth={onSuccessPath ? 1.5 : 1}
                    opacity={onSuccessPath ? 0.95 : 0.7} />
            );
          })}
          {nodes.map((n) => {
            if (n.outcome) {
              const ok = n.outcome === 'success';
              return (
                <g key={n.id}>
                  <circle cx={n.x} cy={n.y} r={5} fill={ok ? c.base : 'none'} stroke={ok ? c.base : '#52525b'} strokeWidth={1.2} />
                  <text x={n.x + 10} y={n.y + 3} fontFamily='"IBM Plex Mono", monospace' fontSize={9}
                        fill={ok ? c.base : '#52525b'}>{ok ? '✓' : '✗'}</text>
                </g>
              );
            }
            const onSuccess = successPath.has(n.id);
            return (
              <g key={n.id}>
                <circle cx={n.x} cy={n.y} r={4} fill="#0c0d10" stroke={onSuccess ? c.base : '#71717a'} strokeWidth={1} />
                <text x={n.x} y={n.y - 8} fontFamily='"IBM Plex Mono", monospace' fontSize={8}
                      fill={onSuccess ? c.base : '#a1a1aa'} textAnchor="middle">{n.label}</text>
              </g>
            );
          })}
          <text x={20} y={26} fontFamily='"IBM Plex Mono", monospace' fontSize={10}
                fill="#a1a1aa" letterSpacing="0.15em">AGENT TRACE</text>
          <text x={340} y={26} fontFamily='"IBM Plex Mono", monospace' fontSize={10}
                fill={c.base} letterSpacing="0.05em" textAnchor="end">5.6% success</text>
        </svg>
      );
    }

    function TaskOverlay({ taskId, pillar }) {
      switch (taskId) {
        case 'T1': return <T1Overlay pillar={pillar} />;
        case 'T2': return <T2Overlay pillar={pillar} />;
        case 'T3': return <T3Overlay pillar={pillar} />;
        case 'T4': return <T4Overlay pillar={pillar} />;
        case 'T5': return <T5Overlay pillar={pillar} />;
        case 'T6': return <T6Overlay pillar={pillar} />;
        case 'T7': return <T7Overlay pillar={pillar} />;
        case 'T8': return <T8Overlay pillar={pillar} />;

    // ---------- BROADCAST VIEWPORT ----------
    function BroadcastViewport({ task, t }) {

            <div style={{ fontFamily: '"IBM Plex Mono", monospace', fontSize: 10, letterSpacing: '0.15em', color: '#a1a1aa' }}>

          </div>

          {/* Base schematic or tree */}
          <div style={{ position: 'absolute', inset: 0 }}>
            {isT9 ? (

              <HalfCourt>
                <PlayLoop t={t} pillarColor={c.base} glow={c.glow} />

            zIndex: 5,

              <span style={{ fontFamily: '"IBM Plex Mono", monospace', fontSize: 11, color: c.base, fontWeight: 600 }}>{task.id}</span>
              <span style={{ fontFamily: '"IBM Plex Sans", sans-serif', fontSize: 11, color: '#e4e4e7' }}>{task.name}</span>
            </div>
            <div style={{ flex: 1, margin: '0 14px', height: 2, background: '#1c1c1f', borderRadius: 1, overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${t * 100}%`, background: c.base }} />
            </div>
            <span style={{ fontFamily: '"IBM Plex Mono", monospace', fontSize: 10, color: '#a1a1aa', letterSpacing: '0.1em' }}>{task.metric}</span>
          </div>
        </div>
      );

    // ---------- CLIFF BARS ----------
    function CliffBars({ tasks, progress, currentIndex }) {
      const N = tasks.length;
      const getFill = (i) => {
        const start = i / N;
        const end = (i + 0.85) / N;
        return smooth((progress - start) / (end - start));
      };
      return (
        <div style={{ position: 'relative', width: '100%', height: '100%' }}>
          <svg viewBox="0 0 1000 600" preserveAspectRatio="none"
               style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}>
            {[0, 25, 50, 75, 100].map((y) => (
              <g key={y}>
                <line x1={70} x2={970}
                      y1={540 - (y / 100) * 480}
                      y2={540 - (y / 100) * 480}
                      stroke="#27272a" strokeWidth={1}
                      strokeDasharray={y === 0 ? '0' : '2 4'} />
                <text x={56} y={540 - (y / 100) * 480 + 4}
                      fontFamily='"IBM Plex Mono", monospace'
                      fontSize={11} fill="#52525b" textAnchor="end">{y}</text>
              </g>
            ))}
            <text x={56} y={32}
                  fontFamily='"IBM Plex Mono", monospace'
                  fontSize={10} fill="#71717a" textAnchor="end"
                  letterSpacing="0.1em">SCORE</text>
          </svg>

          <div style={{
            position: 'absolute', left: '7%', right: '3%', top: '8%', bottom: '10%',
            display: 'grid', gridTemplateColumns: `repeat(${N}, 1fr)`,
            gap: 14, alignItems: 'end',
          }}>
            {tasks.map((t, i) => {
              const fill = getFill(i);
              const c = PILLARS[t.pillar];
              const isActive = i === currentIndex;
              const isPast = i < currentIndex;
              const heightPct = fill * t.score;
              return (
                <div key={t.id} style={{ position: 'relative', height: '100%', display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', alignItems: 'center' }}>
                  <div style={{
                    position: 'absolute', bottom: `${heightPct}%`,
                    transform: 'translateY(-4px)',
                    fontFamily: '"IBM Plex Mono", monospace', fontSize: 11,
                    color: fill > 0.5 ? c.base : 'transparent',
                    fontWeight: 600, opacity: fill, transition: 'color 200ms',
                  }}>{Math.round(fill * t.score)}</div>
                  <div style={{
                    width: '100%', height: `${heightPct}%`,
                    background: `linear-gradient(180deg, ${c.base} 0%, ${c.base}cc 100%)`,
                    boxShadow: isActive
                      ? `0 0 28px ${c.glow}, 0 0 60px ${c.glow}`
                      : isPast ? `0 0 8px ${c.soft}` : 'none',
                    opacity: isActive ? 1 : isPast ? 0.85 : 0.95,
                    borderRadius: 1,
                    transition: 'box-shadow 300ms, opacity 300ms',
                  }} />
                  <div style={{
                    marginTop: 10,
                    fontFamily: '"IBM Plex Mono", monospace', fontSize: 12,
                    color: isActive ? c.base : isPast ? '#a1a1aa' : '#52525b',
                    fontWeight: isActive ? 600 : 400,
                    transition: 'color 250ms',
                  }}>{t.id}</div>
                </div>
              );
            })}
          </div>

          <div style={{
            position: 'absolute', left: '7%', right: '3%', bottom: '2%',
            display: 'flex', gap: 4,
            fontFamily: '"IBM Plex Mono", monospace', fontSize: 9,
            letterSpacing: '0.15em', textTransform: 'uppercase',
          }}>
            {[
              { name: 'Perception', span: 3 },
              { name: 'Reasoning',  span: 3 },
              { name: 'Simulation', span: 2 },
              { name: 'Agency',     span: 1 },
            ].map((p) => (
              <div key={p.name} style={{
                flex: p.span,
                borderTop: `1px solid ${PILLARS[p.name].base}`,
                paddingTop: 6, color: PILLARS[p.name].base,
                textAlign: 'center', opacity: 0.75,
              }}>{p.name}</div>
            ))}
          </div>

          <CliffAnnotation visible={progress > 0.92} />
        </div>
      );
    }

    function CliffAnnotation({ visible }) {
      const left = 9.5, right = 96.5;
      const bandWidth = (right - left) / 9;
      const xT2 = (left + bandWidth * 1.5) * 10;
      const xT9 = (left + bandWidth * 8.5) * 10;
      const yT2 = 540 - (74 / 100) * 480;
      const yT9 = 540 - (6 / 100) * 480;
      return (
        <svg viewBox="0 0 1000 600" preserveAspectRatio="none"
             style={{
               position: 'absolute', inset: 0, width: '100%', height: '100%',
               pointerEvents: 'none', opacity: visible ? 1 : 0,
               transition: 'opacity 600ms ease',

          <line x1={xT2} y1={yT2 - 8} x2={xT9} y2={yT9 - 8}

                fontFamily='"IBM Plex Sans", sans-serif'
                fontSize={11} fill="#a1a1aa" textAnchor="middle">
            same data · same models
          </text>
        </svg>
      );
    }

    function ProgressDots({ tasks, currentIndex }) {
